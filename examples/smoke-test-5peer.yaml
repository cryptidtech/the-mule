# Smoke test: 5 peers on a single host (heterogeneous images)
#
# Tests the full lifecycle with Rust, Python, and Go reference peers:
#   1. Pre-pull all three reference images
#   2. All 5 peers start and report "started"
#   3. Bootstrap addresses are exchanged
#   4. All peers connect to the Kademlia DHT
#   5. alice (Rust) pushes a message to bob (Python)
#   6. bob (Python) pulls messages
#   7. charlie (Go) does a key rotation
#   8. eve (Python) tracks alice (Rust)
#   9. dave (Rust) disconnects and restarts with delay
#  10. All peers shut down cleanly

name: "smoke-test-5peer"

timeout:
  startup: 60
  shutdown: 30

redis:
  port: 6399
  image: "redis:7-alpine"

images:
  - "ghcr.io/cryptidtech/rust-mule:latest"
  - "ghcr.io/cryptidtech/python-mule:latest"
  - "ghcr.io/cryptidtech/go-mule:latest"

hosts:
  - address: localhost
    ssh_user: user
    ssh_auth: agent
    base_port: 11984

peers:
  - name: alice
    image: "ghcr.io/cryptidtech/rust-mule:latest"
    bootstrap: [bob, charlie]
    environment:
      RUST_LOG: info
  - name: bob
    image: "ghcr.io/cryptidtech/python-mule:latest"
    bootstrap: [alice]
    environment:
      LOGLEVEL: INFO
      LOG_LEVEL: INFO
  - name: charlie
    image: "ghcr.io/cryptidtech/go-mule:latest"
    bootstrap: [alice, bob]
    environment:
      LOG_LEVEL: info
  - name: dave
    image: "ghcr.io/cryptidtech/rust-mule:latest"
    bootstrap: [alice, charlie]
    environment:
      RUST_LOG: info
  - name: eve
    image: "ghcr.io/cryptidtech/python-mule:latest"
    bootstrap: [bob, dave]
    environment:
      LOGLEVEL: INFO
      LOG_LEVEL: INFO

commands:
  # t=0: everyone connects
  - { time: 0,  peer: alice,   command: "connect" }
  - { time: 0,  peer: bob,     command: "connect" }
  - { time: 0,  peer: charlie, command: "connect" }
  - { time: 0,  peer: dave,    command: "connect" }
  - { time: 0,  peer: eve,     command: "connect" }

  # t=10: alice (Rust) pushes a message to bob (Python)
  - { time: 10, peer: alice,   command: "push|bob|hello-from-alice" }

  # t=15: bob (Python) pulls messages
  - { time: 15, peer: bob,     command: "pull" }

  # t=20: charlie (Go) rotates its key
  - { time: 20, peer: charlie, command: "rotate-key" }

  # t=25: dave (Rust) restarts with 5s delay (tests exit-42 + entrypoint.sh)
  - { time: 25, peer: dave,    command: "restart|5" }

  # t=35: eve (Python) tracks alice (Rust)
  - { time: 35, peer: eve,     command: "track|alice" }

  # t=40: dave (Rust) disconnects
  - { time: 40, peer: dave,    command: "disconnect" }

  # Automatic shutdown is sent to all peers when all commands are complete
