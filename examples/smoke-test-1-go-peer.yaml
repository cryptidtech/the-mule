# Smoke test: 1 peer running the go-mule image
#
test_name: "smoke-test-1-go-peer"

redis:
  port: 6399
  image: "redis:7-alpine"

images:
  - "ghcr.io/cryptidtech/go-mule:latest"

hosts:
  - address: localhost
    ssh_user: user
    ssh_auth: agent
    base_port: 11984

peers:
  - name: charlie
    image: "ghcr.io/cryptidtech/go-mule:latest"
    bootstrap: []
    environment:
      LOG_LEVEL: info

commands:
  # t=0: charlie connects
  - { time: 0,  peer: charlie, command: "connect" }

  # t=10: charlie pushes a message to charlie
  - { time: 10, peer: charlie, command: "push|charlie|hello-from-charlie" }

  # t=15: charlie pull messages
  - { time: 15, peer: charlie, command: "pull" }

  # t=20: charlie rotates its key
  - { time: 20, peer: charlie, command: "rotate-key" }

  # t=25: charlie (Rust) restarts with 5s delay (tests exit-42 + entrypoint.sh)
  - { time: 25, peer: charlie, command: "restart|5" }

  # t=35: charlie tracks charlie
  - { time: 35, peer: charlie, command: "track|charlie" }

  # t=40: charlie disconnects
  - { time: 40, peer: charlie, command: "disconnect" }

  # Automatic shutdown is sent to all peers when all commands are complete

timeout:
  startup: 60
  shutdown: 30
